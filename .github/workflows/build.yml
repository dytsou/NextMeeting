name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup SSH deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Trust GitHub host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Use SSH for pushes
        run: git remote set-url origin "git@github.com:${{ github.repository }}.git"

      - name: Read version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Sync Info.plist version from package.json
        id: sync-info-plist-version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.value }}" NextMeeting/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.value }}" NextMeeting/Info.plist
          # Use git diff inside `if` so a non-zero exit (file changed) does not fail the step under bash -e
          if git diff --quiet NextMeeting/Info.plist; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Amend HEAD with synced Info.plist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.sync-info-plist-version.outputs.changed == 'true'
        run: |
          git config user.name "dytsou"
          git config user.email "dytsou@gmail.com"
          git add NextMeeting/Info.plist
          git commit --amend --no-edit
          git push --force-with-lease origin "HEAD:${{ github.ref_name }}"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.value }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: make build

      - name: Zip app
        run: zip -r NextMeeting.zip NextMeeting.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: NextMeeting-${{ steps.version.outputs.value }}.zip
          path: NextMeeting.zip

      - name: Create tag
        if: github.ref == 'refs/heads/main' && steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.value }}
          git push origin v${{ steps.version.outputs.value }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          files: NextMeeting.zip
          generate_release_notes: true
